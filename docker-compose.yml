services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vocaplay
    ports:
      - "5432:5432"
    volumes:
      - vocaplay-db:/var/lib/postgresql/data

  api:
    build:
      context: ./src
      dockerfile: VocaPlay.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=vocaplay;Username=postgres;Password=postgres"
      Jwt__Secret: "dev-only-secret-key-min-32-characters-long"
      Jwt__Issuer: "VocaPlay"
      Jwt__Audience: "VocaPlayUsers"
      Jwt__AccessTokenExpiryMinutes: "60"
      Jwt__RefreshTokenExpiryDays: "30"
      OpenAI__ApiKey: "${OPENAI_API_KEY}"
      OpenAI__Model: "gpt-4o"
      OpenAI__MaxHistoryMessages: "10"
      Cors__AllowedOrigins__0: "http://localhost:5173"
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  vocaplay-db:
